name: Deploy Supabase Migrations
# Triggered on migration and workflow changes.

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login to Supabase
        run: supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Validate Project Ref Format
        shell: bash
        run: |
          if [[ ! "$SUPABASE_PROJECT_ID" =~ ^[a-z0-9]{20}$ ]]; then
            echo "::error::SUPABASE_PROJECT_ID must be the Supabase project ref (20 lowercase letters/numbers), not the GitHub repo id or project name."
            exit 1
          fi
          echo "Project ref format looks valid: $SUPABASE_PROJECT_ID"

      - name: Verify Supabase Project Access
        shell: bash
        run: |
          supabase projects list -o json > projects.json
          python - <<'PY'
          import json
          import os
          import sys

          project_ref = os.environ["SUPABASE_PROJECT_ID"]

          with open("projects.json", "r", encoding="utf-8") as f:
              projects = json.load(f)

          matched = next((p for p in projects if p.get("ref") == project_ref), None)

          if not matched:
              print("::error::Configured SUPABASE_PROJECT_ID was not found in projects accessible by this access token.")
              print(json.dumps(projects, ensure_ascii=False, indent=2))
              sys.exit(1)

          print(f"Supabase project access verified: ref={matched.get('ref')}, name={matched.get('name')}, region={matched.get('region')}, status={matched.get('status')}")
          PY

      - name: Validate DB URL
        shell: bash
        run: |
          if [[ -z "$SUPABASE_DB_URL" ]]; then
            echo "::error::SUPABASE_DB_URL secret is empty."
            exit 1
          fi

          if [[ ! "$SUPABASE_DB_URL" =~ ^postgres(ql)?:// ]]; then
            echo "::error::SUPABASE_DB_URL must start with postgres:// or postgresql://"
            exit 1
          fi

          echo "SUPABASE_DB_URL format looks valid."

      - name: Push Database Migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes